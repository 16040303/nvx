<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Child and robot learning scene</title>
  <desc id="desc">A warm outdoor scene with a child using a laptop beside a friendly educational robot.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ed2ff"/>
      <stop offset="100%" stop-color="#d8f2ff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84c57b"/>
      <stop offset="100%" stop-color="#6fb56f"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#b8d5f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#sky)"/>
  <rect y="232" width="640" height="128" fill="url(#grass)"/>

  <g opacity="0.32">
    <circle cx="80" cy="86" r="18" fill="#ffffff"/>
    <circle cx="126" cy="72" r="12" fill="#ffffff"/>
    <circle cx="550" cy="92" r="16" fill="#ffffff"/>
  </g>

  <g filter="url(#soft)">
    <rect x="72" y="196" width="250" height="96" rx="18" fill="#f7fbff"/>
    <rect x="104" y="214" width="126" height="62" rx="8" fill="#7ea9d8"/>
    <rect x="112" y="220" width="110" height="43" rx="6" fill="#1f3250"/>

    <ellipse cx="284" cy="192" rx="44" ry="28" fill="#f3c9a8"/>
    <path d="M250 178c6-28 54-38 76-12 7 8 8 19 6 30-19-5-64-7-82-18z" fill="#3d2f34"/>
    <rect x="248" y="198" width="72" height="86" rx="24" fill="#6ea4ff"/>
    <rect x="224" y="218" width="36" height="18" rx="9" fill="#f3c9a8"/>
    <rect x="308" y="218" width="36" height="18" rx="9" fill="#f3c9a8"/>

    <ellipse cx="466" cy="196" rx="52" ry="44" fill="url(#robotBody)"/>
    <rect x="436" y="226" width="60" height="76" rx="22" fill="#d4e7ff"/>
    <circle cx="448" cy="194" r="8" fill="#1f4f94"/>
    <circle cx="484" cy="194" r="8" fill="#1f4f94"/>
    <rect x="454" y="214" width="24" height="8" rx="4" fill="#4d6ea8"/>
    <rect x="418" y="238" width="20" height="50" rx="10" fill="#b4cff3"/>
    <rect x="496" y="238" width="20" height="50" rx="10" fill="#b4cff3"/>
  </g>
</svg>
